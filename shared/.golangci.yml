# Canonical golangci-lint config for all whengas + jr200-labs Go repos.
# Per-repo can override by placing a local .golangci.yml that extends this.
# Download to .shared/.golangci.yml via sync-shared-lint.sh

version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF*"     # quick-fix suggestions — too opinionated
        - "-ST*"     # style rules — too noisy for existing codebase

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
