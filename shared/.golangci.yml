# Canonical golangci-lint config for all whengas + jr200-labs Go repos.
# Per-repo can override by placing a local .golangci.yml that extends this.
# Download to .shared/.golangci.yml via sync-shared-lint.sh

version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
  settings:
    staticcheck:
      checks:
        - "all"
        - "-QF1008"  # embedded field selectors — explicit nesting is clearer
        - "-ST1005"  # error string formatting — too strict for our codebase

run:
  timeout: 5m

formatters:
  enable:
    - gofmt
