# hadolint config — shared canonical defaults for jr200-labs Docker images.
# Synced via shared/sync.sh into .shared/.hadolint.yaml (gitignored).
# The lint_docker.yaml reusable workflow auto-copies this to repo root at
# CI time if no committed .hadolint.yaml is present, so hadolint picks it up.
#
# Override locally by committing a .hadolint.yaml at repo root — it wins.

failure-threshold: warning

ignored:
  # DL3008: pin apt versions — noisy for runner/dev images that intentionally
  # track the latest security-patched versions from the distro repo.
  - DL3008
  # DL3013: pin pip versions — same reasoning for Python base images.
  - DL3013
  # DL3059: multiple consecutive RUN — legitimate tradeoff between layer
  # count and build-cache granularity; we allow both.
  - DL3059

trusted-registries:
  - ghcr.io
  - docker.io
  - registry.k8s.io
  - quay.io
