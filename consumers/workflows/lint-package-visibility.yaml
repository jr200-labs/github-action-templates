name: lint-package-visibility

# Daily check that the calling org's GHCR container package visibility
# matches the expected policy. Allowlist is read from the repo/org
# variable PACKAGE_VISIBILITY_ALLOWLIST (CSV) so the canonical caller
# stays consumer-agnostic and drift-check passes.

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lint:
    uses: jr200-labs/github-action-templates/.github/workflows/lint_package_visibility.yaml@master
    with:
      allowlist: ${{ vars.PACKAGE_VISIBILITY_ALLOWLIST }}
