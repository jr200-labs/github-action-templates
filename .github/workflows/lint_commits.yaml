name: template-lint-commits

# Reusable workflow that validates all commits in a pull request against
# the Conventional Commits spec via wagoid/commitlint-github-action.
#
# Caller repos are expected to commit a `commitlint.config.mjs` file at
# the repo root, typically:
#
#   export default { extends: ['@commitlint/config-conventional'] }
#
# The action picks it up automatically. An inline fallback config is
# provided for repos that don't ship one yet.

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''
      fail-on-warnings:
        description: 'Treat commitlint warnings as failures'
        required: false
        type: boolean
        default: false
      config-file:
        description: 'Path to commitlint config file (optional; auto-detected otherwise)'
        required: false
        type: string
        default: ''

jobs:
  commitlint:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    permissions:
      contents: read
      pull-requests: read
    env:
      # Surfaced from the caller's org/repo Actions vars so the shared
      # commitlint config (shared/commitlint.config.mjs) can enforce the
      # banned-words rule. Empty value disables the rule cleanly.
      BANNED_COMMIT_WORDS: ${{ vars.BANNED_COMMIT_WORDS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # Bootstrap the cached shared commitlint config. Consumers re-export
      # it from a top-level commitlint.config.mjs; .shared/ is gitignored
      # so we always fetch fresh in CI. Mirrors the pattern in ci_go.yaml.
      - name: Bootstrap shared commitlint config
        shell: bash
        run: |
          mkdir -p .shared
          curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/commitlint.config.mjs" \
            -o .shared/commitlint.config.mjs

      # wagoid action trips EISDIR if configFile is passed as empty string
      # (cosmiconfig then treats the workspace dir as a file). Split into two
      # steps so we only pass configFile when the caller actually set it.
      - name: Commitlint (auto-detect config)
        if: inputs.config-file == ''
        uses: wagoid/commitlint-github-action@v6
        env:
          BANNED_COMMIT_WORDS: ${{ vars.BANNED_COMMIT_WORDS }}
        with:
          failOnWarnings: ${{ inputs.fail-on-warnings }}

      - name: Commitlint (explicit config)
        if: inputs.config-file != ''
        uses: wagoid/commitlint-github-action@v6
        env:
          BANNED_COMMIT_WORDS: ${{ vars.BANNED_COMMIT_WORDS }}
        with:
          failOnWarnings: ${{ inputs.fail-on-warnings }}
          configFile: ${{ inputs.config-file }}
