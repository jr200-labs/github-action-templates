name: template-build-docker-image-multiplatform

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      registry_name:
        description: docker-registry-name
        required: false
        type: string
        default: ghcr.io
      image_name:
        description: docker-image-name
        required: true
        type: string
      tag:
        description: docker-image-tag
        required: true
        type: string
      platforms:
        description: platform-filter-json
        required: true
        type: string
      runner:
        description: 'Runner label for non-build jobs (e.g. ubuntu-latest or self-hosted). Build jobs use platform-specific runners from the matrix.'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile, relative to repo root (optional). When empty, auto-detects at docker/Dockerfile or ./Dockerfile. Set explicitly for monorepos with multiple images (e.g. images/base/Dockerfile).'
        required: false
        type: string
        default: ''
      context:
        description: 'Build context directory, relative to repo root. Default: repo root.'
        required: false
        type: string
        default: '.'
    secrets:
      registry_username:
        required: true
      registry_token:
        required: true
      git_token:
        required: false
        description: "Token for cloning private git dependencies during Docker build (deprecated: use client_id + app_private_key instead)"
      client_id:
        required: false
        description: "GitHub App Client ID for generating a token to clone private git deps"
      app_private_key:
        required: false
        description: "GitHub App private key for generating a token to clone private git deps"

env:
  IMAGE_NAME: ${{ inputs.image_name }}
  REGISTRY_IMAGE: ${{ inputs.registry_name }}/${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DEFAULT_UNIVERSE: |-
    [
      {"platform": "linux/amd64", "os": "linux", "architecture": "amd64", "build-os": "ubuntu-latest"},
      {"platform": "linux/arm64", "os": "linux", "architecture": "arm64", "build-os": "ubuntu-24.04-arm"}
    ]

jobs:
  setup-matrix:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    outputs:
      matrix: ${{ steps.create-matrix.outputs.matrix }}
    steps:
      - name: Determine Platforms
        id: create-matrix
        run: |
          platforms='${{ inputs.platforms }}'
          default_universe='${{ env.DEFAULT_UNIVERSE }}'

          echo "input filtered_platforms: $platforms"
          echo "input default_universe: $default_universe"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "filtering matrix using workflow_dispatch arguments"
            result_matrix=$(echo "$default_universe" | jq -c --argjson platforms "$platforms" '[.[] | select($platforms[] == .platform)]')
          else
            echo "matrix filtering skipped"
            result_matrix=$(echo "$default_universe" | jq -c)
          fi

          echo set-matrix: $result_matrix
          echo "matrix=$result_matrix" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.platform }} Image
    needs: setup-matrix
    runs-on: ${{ matrix.build-os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout-ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log into registry ${{ inputs.registry_name }}
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry_name }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_token }}

      - name: Detect Dockerfile
        id: detect-dockerfile
        run: |
          if [ -n "${{ inputs.dockerfile }}" ]; then
            if [ ! -f "${{ inputs.dockerfile }}" ]; then
              echo "::error::dockerfile input set to '${{ inputs.dockerfile }}' but file not found"
              exit 1
            fi
            echo "dockerfile=${{ inputs.dockerfile }}" >> $GITHUB_OUTPUT
          elif [ -f docker/Dockerfile ]; then
            echo "dockerfile=docker/Dockerfile" >> $GITHUB_OUTPUT
          elif [ -f Dockerfile ]; then
            echo "dockerfile=Dockerfile" >> $GITHUB_OUTPUT
          else
            echo "::error::No Dockerfile found at docker/Dockerfile or ./Dockerfile, and no dockerfile input set"
            exit 1
          fi

      - name: Check if private git deps auth is configured
        id: check-git-auth
        run: |
          if [ -n "$CLIENT_ID" ] && [ -n "$APP_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping private git deps auth (client_id/app_private_key not configured)"
          fi
        env:
          CLIENT_ID: ${{ secrets.client_id }}
          APP_KEY: ${{ secrets.app_private_key }}

      - name: Generate token for private git deps
        if: steps.check-git-auth.outputs.available == 'true'
        id: git-auth
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Write netrc for private git deps
        if: steps.git-auth.outputs.token != ''
        run: printf 'machine github.com\nlogin x-access-token\npassword %s\n' "${{ steps.git-auth.outputs.token }}" > /tmp/.netrc

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7
        with:
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          file: ${{ steps.detect-dockerfile.outputs.dockerfile }}
          context: ${{ inputs.context }}
          provenance: false
          cache-from: type=gha,scope=${{ inputs.tag }}-${{ matrix.platform }}
          cache-to: type=gha,scope=${{ inputs.tag }}-${{ matrix.platform }},mode=max
          build-args: |
            BUILD_OS=${{ matrix.os }}
            BUILD_ARCH=${{ matrix.architecture }}
          secret-files: |
            netrc=/tmp/.netrc

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build-and-push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v5
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge platform specific Docker image into multi platform image
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    needs:
      - build

    permissions:
      contents: write
      packages: write

    steps:
      - name: Download digests
        uses: actions/download-artifact@v5
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry_name }}
          username: ${{ secrets.registry_username }}
          password: ${{ secrets.registry_token }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ env.REGISTRY_IMAGE }}:${{ inputs.tag }} \
            $(printf '${{ env.REGISTRY_IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ inputs.tag }}


      # - name: Repository Dispatch
      #   uses: peter-evans/repository-dispatch@v4
      #   if: github.event_name != 'workflow_dispatch'
      #   with:
      #     token: ${{ secrets.GITHUB_TOKEN }}
      #     event-type: ${{ inputs.next_workflow }}
      #     client-payload: |-
      #       {
      #         "ref": "${{ github.ref }}",
      #         "sha": "${{ github.sha }}",
      #         "tag": "${{ inputs.tag }}",
      #         "artifacts": "${{ env.REGISTRY_IMAGE }}:${{ inputs.tag }}"
      #       }
