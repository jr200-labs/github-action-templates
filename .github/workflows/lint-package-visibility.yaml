name: lint-package-visibility

# Catches GHCR container package visibility drift in the jr200-labs
# org against the WG-141 platform policy: jr200-labs packages are
# open-source so must stay Public. Internal-flipped-to-Private locks
# external consumers out silently.
#
# Scoped to same-org because GITHUB_TOKEN gives `packages:read` on
# its own org without extra App plumbing. The whengas-org check
# (expected=internal) lives in whengas-iac as a separate caller of
# scripts/lint-package-visibility.sh — same script, same policy
# layer, runs in the right token context.
#
# Daily cron + manual dispatch.

on:
  schedule:
    - cron: "0 7 * * *"  # 07:00 UTC = 16:00 Asia/Tokyo, daily
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  lint:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - uses: actions/checkout@v5
      - name: Lint jr200-labs package visibility
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./scripts/lint-package-visibility.sh jr200-labs public
