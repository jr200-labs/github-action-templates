name: template-ci-uv-python

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref (leave empty to use the event's natural ref)"
        required: false
        type: string
        default: ""
      uv-sync-args:
        description: "Additional args for uv sync (e.g. '--extra nats --extra s3' or '--all-extras')"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest"
        required: false
        type: boolean
        default: true
      apt-packages:
        description: "Space-separated list of apt packages to install before uv sync (e.g. 'libmariadb-dev')"
        required: false
        type: string
        default: ""
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      client_id:
        required: false
        description: "GitHub App Client ID for generating a token to clone private git deps"
      app_private_key:
        required: false
        description: "GitHub App private key for generating a token to clone private git deps"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check if private git deps auth is configured
        id: check-git-auth
        run: |
          if [ -n "$CLIENT_ID" ] && [ -n "$APP_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          CLIENT_ID: ${{ secrets.client_id }}
          APP_KEY: ${{ secrets.app_private_key }}

      - name: Generate token for private git deps
        if: steps.check-git-auth.outputs.available == 'true'
        id: git-auth
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Write netrc for private git deps
        if: steps.git-auth.outputs.token != ''
        run: printf 'machine github.com\nlogin x-access-token\npassword %s\n' "${{ steps.git-auth.outputs.token }}" > ~/.netrc

      - name: Install system dependencies
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: Install Python and dependencies
        run: |
          uv python install
          uv sync --group dev ${{ inputs.uv-sync-args }}

      - name: Verify version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: git tag v${TAG} but pyproject.toml has version ${PKG_VERSION}"
            exit 1
          fi
          echo "✓ Version matches: v${TAG}"

      - name: Sync shared lint config
        run: |
          mkdir -p .shared
          curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/ruff.toml" \
            -o .shared/ruff.toml

      - name: Lint
        run: |
          uv run ruff check --config .shared/ruff.toml --output-format=github .
          uv run ruff format --config .shared/ruff.toml --check .

      - name: Type-check
        run: uv run mypy .

      - name: Test
        if: inputs.run-tests
        run: uv run pytest
