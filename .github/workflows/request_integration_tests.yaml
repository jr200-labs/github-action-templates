name: template-request-integration-tests

on:
  workflow_call:
    inputs:
      tag:
        description: "Release tag (e.g. v0.5.0)"
        required: true
        type: string
      target_repo:
        description: "Repo to dispatch integration tests to (e.g. <org>/<consumer-repo>)"
        required: true
        type: string
      library_name:
        description: "Pip package name being tested (e.g. <library-name>)"
        required: true
        type: string
      library_repo:
        description: "Repo containing the library (e.g. <org>/<library-repo>)"
        required: true
        type: string
      callback_repo:
        description: "Repo to dispatch results back to (e.g. <org>/<library-repo>)"
        required: true
        type: string
      callback_event_type:
        description: "Event type for the callback dispatch"
        required: false
        type: string
        default: "dispatch-integration-result"
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''
    secrets:
      client_id:
        required: true
        description: "GitHub App Client ID for cross-repo token generation"
      app_private_key:
        required: true
        description: "GitHub App private key for cross-repo token generation"

jobs:
  dispatch:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Generate cross-repo token
        uses: actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch integration tests to target repo
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: ${{ inputs.target_repo }}
          event-type: dispatch-run-integration-tests
          client-payload: |-
            {
              "library_name": "${{ inputs.library_name }}",
              "library_repo": "${{ inputs.library_repo }}",
              "library_tag": "${{ inputs.tag }}",
              "callback_repo": "${{ inputs.callback_repo }}",
              "callback_event_type": "${{ inputs.callback_event_type }}"
            }

      - name: Log dispatch
        run: |
          echo "Dispatched integration tests to ${{ inputs.target_repo }}"
          echo "  library: ${{ inputs.library_name }}@${{ inputs.tag }}"
          echo "  callback: ${{ inputs.callback_repo }} (${{ inputs.callback_event_type }})"
