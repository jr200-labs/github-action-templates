name: template-build-publish-npmjs

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      pnpm-run-test:
        description: "pnpm run test:run"
        required: false
        type: string
        default: 'true'
      pnpm-publish-args:
        description: "pnpm publish args"
        required: false
        type: string
        default: ~
      node-version:
        description: "node version"
        required: false
        type: string
        default: '20'
    secrets:
      npmjs_api_token:
        required: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm

      - name: Use clean pnpm-workspace config for CI (avoid locally stored packages used in dev)
        run: |
          if [ -f pnpm-workspace.yaml ]; then
            mv pnpm-workspace.yaml pnpm-workspace.local.yaml
          fi

      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run prettier --write

      - name: run tests (optionally configured)
        if: inputs.pnpm-run-test == 'true'
        run: pnpm run test:run

      - run: pnpm run build

      - name: Restore pnpm-workspace config
        run: |
          if [ -f pnpm-workspace.local.yaml ]; then
            mv pnpm-workspace.local.yaml pnpm-workspace.yaml
          fi

      - name: Configure npm for pnpm
        run: |
          echo "//registry.npmjs.org/:_authToken=${{ secrets.npmjs_api_token }}" > ~/.npmrc

      - name: Pre-publish diagnostics
        continue-on-error: true
        run: |
          set +e

          echo "--- npm auth check ---"
          NPM_USER=$(npm whoami 2>&1)
          if [ $? -ne 0 ]; then
            echo "::warning::npm whoami failed: $NPM_USER"
            echo "::warning::The NPMJS_API_TOKEN may be invalid, expired, or missing."
          else
            echo "Authenticated as: $NPM_USER"
          fi

          PACKAGE_NAME=$(node -p "require('./package.json').name" 2>/dev/null || echo "unknown")
          echo "Package: $PACKAGE_NAME"

          SCOPE=$(echo "$PACKAGE_NAME" | grep -oP '^@\K[^/]+' || true)
          if [ -n "$SCOPE" ]; then
            echo ""
            echo "--- npm org membership check (@$SCOPE) ---"
            ORG_MEMBERS=$(npm org ls "$SCOPE" 2>&1)
            echo "$ORG_MEMBERS"
            if echo "$ORG_MEMBERS" | grep -q "$NPM_USER"; then
              echo "User '$NPM_USER' found in @$SCOPE org"
            else
              echo "::warning::User '$NPM_USER' not found in @$SCOPE org member list."
              echo "::warning::Verify at: https://www.npmjs.com/settings/$SCOPE/members"
            fi
          fi

          echo ""
          echo "--- package existence check ---"
          LATEST=$(npm view "$PACKAGE_NAME" version 2>&1)
          if [ $? -eq 0 ]; then
            echo "Package exists on registry (latest: $LATEST)"
          else
            echo "Package does not yet exist on registry (first publish)"
          fi

          echo ""
          echo "--- environment info ---"
          echo "node: $(node --version)"
          echo "npm:  $(npm --version)"
          echo "pnpm: $(pnpm --version)"

      - name: build publish command
        id: build-command
        run: |
          BASE_CMD="pnpm publish --access public --no-git-checks"
          
          if [ "${{ inputs.pnpm-publish-args }}" != "null" ] && [ "${{ inputs.pnpm-publish-args }}" != "" ]; then
            PUBLISH_CMD="$BASE_CMD ${{ inputs.pnpm-publish-args }}"
          else
            PUBLISH_CMD="$BASE_CMD"
          fi
          
          echo "Generated command: $PUBLISH_CMD"
          echo "publish_command=$PUBLISH_CMD" >> $GITHUB_OUTPUT

      - name: publish to npmjs
        run: ${{ steps.build-command.outputs.publish_command }}
        env:
          NPM_TOKEN: ${{ secrets.npmjs_api_token }}
