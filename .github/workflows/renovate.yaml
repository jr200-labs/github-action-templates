name: template-renovate

# Self-hosted Renovate via GitHub Actions, scoped to the calling repo only.
#
# This bypasses Mend Cloud entirely. Each consuming repo runs Renovate
# against itself on its own schedule. The per-repo `renovate.json`
# (which extends `github>jr200-labs/github-action-templates`) is
# auto-discovered.
#
# Authentication. Renovate runs against three datasources that need real
# auth: cross-repo private git tags (e.g. a private package @ git+https...),
# the ghcr.io container registry, and the calling repo itself for
# branch/PR/issue creation. The org-level GitHub App secrets cover all of
# this when present:
#
#   * vars.INTEGRATION_APP_ID (= the App's numeric ID)
#   * secrets.INTEGRATION_APP_PRIVATE_KEY (= the App's .pem contents)
#
# Consumer orgs publish these as org-level secrets/variables with
# visibility ALL, populated by a per-org integration App (see JRL-18 for
# the architecture).
#
# When the App secrets are present (the normal case for configured
# consumer orgs), this workflow mints a short-lived installation token
# via actions/create-github-app-token and feeds it to Renovate as
# RENOVATE_TOKEN. When they are not present (e.g. a personal-account
# repo), it falls back to the runner's GITHUB_TOKEN — Renovate still
# works for public datasources (PyPI, npm, github-actions on public
# repos) but cross-repo private lookups will fail with "no-result" and
# the resulting PRs will not trigger downstream CI workflows on the same
# repo. The PR creation itself still works.
#
# Consumer usage (per-repo `.github/workflows/renovate.yml`):
#
#     name: renovate
#     on:
#       schedule:
#         - cron: '17 */4 * * *'
#       workflow_dispatch:
#     jobs:
#       renovate:
#         uses: jr200-labs/github-action-templates/.github/workflows/renovate.yml@master
#         secrets: inherit
#
# `secrets: inherit` is what wires the org-level INTEGRATION_APP_*
# secrets through to the reusable workflow. Without it the App token
# step silently falls back to GITHUB_TOKEN.

on:
  workflow_call:
    inputs:
      log-level:
        description: Renovate LOG_LEVEL — info | debug | trace
        required: false
        type: string
        default: info
      dry-run:
        description: Renovate dry-run mode (full | extract | lookup | empty for normal)
        required: false
        type: string
        default: ''
      client-id:
        description: >
          GitHub App Client ID for minting installation tokens. Callers should
          pass vars.INTEGRATION_CLIENT_ID in their with: block so the
          expression is evaluated in the caller's context, sidestepping
          a GitHub limitation where org-level variables don't resolve
          inside cross-org reusable workflows. If omitted, falls back
          to vars.INTEGRATION_CLIENT_ID evaluated inside the reusable
          workflow (works for same-org callers and callers with per-repo
          variable overrides). See GOTCHAS.md for details.
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      # The App private key is declared as an explicit named secret input
      # because GitHub Actions has a quirk: variables inherited via
      # `secrets: inherit` work across orgs, but SECRETS inherited the same
      # way only work within the same org. Cross-org callers need the
      # secret named explicitly so it can be passed through.
      INTEGRATION_APP_PRIVATE_KEY:
        description: Org-level GitHub App private key (per-org integration App)
        required: false

jobs:
  renovate:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mint App installation token
        id: app-token
        # Use GitHub App auth for private repos only. Public repos on
        # GitHub Free orgs can't receive org-level secrets, so the
        # private key would be empty and the JWT decode fails.
        # Private repos on Teams plan get org secrets fine.
        if: >-
          ${{
            github.event.repository.visibility == 'private'
            && (inputs.client-id != '' || vars.INTEGRATION_CLIENT_ID != '')
          }}
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ inputs.client-id || vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Self-hosted Renovate
        # renovatebot/github-action only publishes specific patch tags, no
        # floating majors. Pin to a known-good release; Renovate itself can
        # be updated independently of this action via the `renovate-version`
        # input below if needed.
        uses: renovatebot/github-action@v46.1.9
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          # Use host networking so the Renovate container shares the
          # runner pod's network. Dind's default bridge network has
          # routing issues that cause ETIMEDOUT on api.github.com.
          docker-network: host
        env:
          LOG_LEVEL: ${{ inputs.log-level }}
          # Install Renovate as a node package instead of docker run.
          # Self-hosted ARC runners use dind whose inner containers
          # can't resolve DNS to api.github.com (ETIMEDOUT).
          RENOVATE_BINARY_SOURCE: install
          # Restrict Renovate to the current repo only.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # The per-repo renovate.json already exists (it extends the shared
          # jr200-labs/github-action-templates preset). Skip the onboarding
          # PR flow so Renovate doesn't open a "Configure Renovate" PR.
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_REQUIRE_CONFIG: 'required'
          # Optional dry-run for debugging without creating branches/PRs.
          RENOVATE_DRY_RUN: ${{ inputs.dry-run }}
