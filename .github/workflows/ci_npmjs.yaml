name: template-ci-npmjs

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: ""
      node-version:
        description: "node version"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        required: false
        type: string
        default: "10"
      run-integration:
        description: "Whether to run the integration test job (pnpm test:integration)"
        required: false
        type: boolean
        default: true
      run-size-limit:
        description: "Run size-limit bundle-size check and post PR comment with diff (requires .size-limit.json and a 'size' script)"
        required: false
        type: boolean
        default: false
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''

env:
  # Disable Next.js anonymous telemetry on CI. No-op for non-Next consumers.
  NEXT_TELEMETRY_DISABLED: "1"

# Cancel superseded runs on the same PR. Master/tag pushes are not
# cancelled (force-pushes to main branches are rare and usually intentional).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    # Detects whether bundle inputs changed. Used to gate the expensive
    # size-limit job, which otherwise runs a full build twice (base + PR)
    # on every PR regardless of whether the change could affect bundle size.
    if: inputs.run-size-limit && github.event_name == 'pull_request'
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    permissions:
      pull-requests: read
    outputs:
      bundle: ${{ steps.filter.outputs.bundle }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            bundle:
              - 'src/**'
              - 'public/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'next.config.*'
              - '.size-limit.json'

  unit:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" field.

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Speeds up Next.js rebuilds. No-op for non-Next repos (path simply missing).
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Verify version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: git tag v${TAG} but package.json has version ${PKG_VERSION}"
            exit 1
          fi
          echo "✓ Version matches: v${TAG}"

      - name: Sync shared lint config
        run: |
          mkdir -p .shared
          curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/eslint.config.mjs" \
            -o .shared/eslint.config.mjs
          # commitlint.config.mjs at the consumer root re-exports the shared
          # config; knip and similar tools walk that file, so .shared/
          # must contain it or they fail with ERR_MODULE_NOT_FOUND.
          curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/commitlint.config.mjs" \
            -o .shared/commitlint.config.mjs

      - name: Syncpack lint
        run: |
          if [ -f .syncpackrc.yaml ] || [ -f .syncpackrc.yml ]; then
            pnpm syncpack lint
          else
            echo "No syncpack config found, skipping"
          fi

      - name: Lint
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" 2>/dev/null; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Test
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null; then
            pnpm test
          else
            echo "No test script found, skipping"
          fi

      - name: Build
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
            pnpm build
          else
            echo "No build script found, skipping"
          fi

      - name: Knip (dead-code detection)
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.knip ? 0 : 1)" 2>/dev/null; then
            pnpm knip
          else
            echo "No knip script found, skipping"
          fi

  integration:
    if: inputs.run-integration
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" field.

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.['test:integration'] ? 0 : 1)" 2>/dev/null; then
            pnpm test:integration
          else
            echo "No test:integration script found, skipping"
          fi

  size-limit:
    if: inputs.run-size-limit && github.event_name == 'pull_request' && needs.changes.outputs.bundle == 'true'
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    needs: [unit, changes]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # Version read from package.json "packageManager" field.

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - name: Size-limit (compare vs base branch, comment on PR)
        uses: andresz1/size-limit-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          package_manager: pnpm
          script: pnpm run size
