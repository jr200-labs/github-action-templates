name: template-ci-npmjs

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: ""
      node-version:
        description: "node version"
        required: false
        type: string
        default: "22"
      pnpm-version:
        description: "pnpm version"
        required: false
        type: string
        default: "10"
      run-integration:
        description: "Whether to run the integration test job (pnpm test:integration)"
        required: false
        type: boolean
        default: true
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'

jobs:
  unit:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version read from package.json "packageManager" field.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify version matches git tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Version mismatch: git tag v${TAG} but package.json has version ${PKG_VERSION}"
            exit 1
          fi
          echo "✓ Version matches: v${TAG}"

      - name: Sync shared lint config
        run: |
          mkdir -p .shared
          curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/eslint.config.mjs" \
            -o .shared/eslint.config.mjs

      - name: Syncpack lint
        run: |
          if [ -f .syncpackrc.yaml ] || [ -f .syncpackrc.yml ]; then
            pnpm syncpack lint
          else
            echo "No syncpack config found, skipping"
          fi

      - name: Lint
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.lint ? 0 : 1)" 2>/dev/null; then
            pnpm lint
          else
            echo "No lint script found, skipping"
          fi

      - name: Test
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.test ? 0 : 1)" 2>/dev/null; then
            pnpm test
          else
            echo "No test script found, skipping"
          fi

      - name: Build
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.build ? 0 : 1)" 2>/dev/null; then
            pnpm build
          else
            echo "No build script found, skipping"
          fi

  integration:
    if: inputs.run-integration
    runs-on: ${{ inputs.runner }}
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # Version read from package.json "packageManager" field.

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: |
          if node -e "const p=require('./package.json'); process.exit(p.scripts?.['test:integration'] ? 0 : 1)" 2>/dev/null; then
            pnpm test:integration
          else
            echo "No test:integration script found, skipping"
          fi
