name: template-lint-docker

# Reusable workflow that lints Dockerfiles with hadolint.
#
# Single-file mode (default): set `dockerfile` to the target path.
# Monorepo mode: set `recursive: true` to lint every Dockerfile in the
# repo — useful for repos like actions-runner-images that host multiple
# image variants under images/<variant>/Dockerfile.
#
# Config discovery (first match wins):
#   1. committed .hadolint.yaml / .hadolint.yml at repo root
#   2. cached .shared/.hadolint.yaml (synced via shared/sync.sh with
#      `docker` language marker) — auto-copied to repo root at CI time
#   3. hadolint built-in defaults

on:
  workflow_call:
    inputs:
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''
      dockerfile:
        description: 'Path to Dockerfile (ignored when recursive: true)'
        required: false
        type: string
        default: 'Dockerfile'
      recursive:
        description: 'Lint every Dockerfile in the repo recursively'
        required: false
        type: boolean
        default: false
      failure-threshold:
        description: 'hadolint severity threshold: error | warning | info | style | ignore | none'
        required: false
        type: string
        default: 'warning'

jobs:
  hadolint:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Use cached shared hadolint config if no committed one
        # hadolint-action auto-reads .hadolint.yaml from repo root only.
        # If consumer uses shared/sync.sh (cache mode → .shared/.hadolint.yaml)
        # and has no committed root config, surface the cached one so
        # hadolint picks it up. Committed root config always wins.
        run: |
          if [ -f ".hadolint.yaml" ] || [ -f ".hadolint.yml" ]; then
            echo "committed .hadolint.yaml present — using as-is"
          elif [ -f ".shared/.hadolint.yaml" ]; then
            cp .shared/.hadolint.yaml .hadolint.yaml
            echo "copied .shared/.hadolint.yaml → .hadolint.yaml"
          else
            echo "no hadolint config found — hadolint will use defaults"
          fi

      - name: hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ${{ inputs.dockerfile }}
          recursive: ${{ inputs.recursive }}
          failure-threshold: ${{ inputs.failure-threshold }}
