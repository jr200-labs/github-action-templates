name: template-run-integration-tests

on:
  workflow_call:
    inputs:
      library_name:
        description: "Pip package name to test (e.g. <library-name>)"
        required: true
        type: string
      library_repo:
        description: "GitHub repo containing the library (e.g. <org>/<library-repo>)"
        required: true
        type: string
      library_tag:
        description: "Git tag of the library version to test"
        required: true
        type: string
      service_registry_path:
        description: "Path to service-registry.yaml in this repo"
        required: false
        type: string
        default: "scripts/service-registry.yaml"
      callback_repo:
        description: "Repo to dispatch results back to"
        required: true
        type: string
      callback_event_type:
        description: "Event type for the callback dispatch"
        required: true
        type: string
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      client_id:
        required: true
        description: "GitHub App Client ID for cross-repo token generation"
      app_private_key:
        required: true
        description: "GitHub App private key for cross-repo token generation"

jobs:
  discover-services:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - uses: actions/checkout@v5

      - name: Generate token
        uses: actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Discover dependent Python services
        id: discover
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          LIBRARY_NAME: ${{ inputs.library_name }}
          LIBRARY_REPO: ${{ inputs.library_repo }}
        run: |
          REGISTRY="${{ inputs.service_registry_path }}"
          SERVICES='[]'

          for svc in $(yq -r '.services | keys | .[]' "$REGISTRY"); do
            vf=$(yq -r ".services.\"$svc\".version_file // \"\"" "$REGISTRY")
            repo=$(yq -r ".services.\"$svc\".repo // \"\"" "$REGISTRY")

            # Only Python services
            [ "$vf" = "pyproject.toml" ] || continue
            # Skip the library itself
            [ "$repo" != "$LIBRARY_REPO" ] || continue

            echo "  Checking $svc ($repo)..."

            # Check if this service depends on the library
            PYPROJECT=$(gh api "repos/$repo/contents/pyproject.toml" \
              --jq '.content' 2>&1 | base64 -d 2>/dev/null || echo "")

            if echo "$PYPROJECT" | grep -q "$LIBRARY_NAME"; then
              SERVICES=$(echo "$SERVICES" | jq -c ". + [{\"service\": \"$svc\", \"repo\": \"$repo\"}]")
              echo "    -> MATCH"
            else
              echo "    -> no match (content length: ${#PYPROJECT})"
            fi
          done

          COUNT=$(echo "$SERVICES" | jq length)
          echo "matrix=$SERVICES" >> $GITHUB_OUTPUT
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "Discovered $COUNT services depending on $LIBRARY_NAME"

  test-service:
    needs: discover-services
    if: fromJson(needs.discover-services.outputs.count) > 0
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-services.outputs.matrix) }}
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Generate token
        uses: actions/create-github-app-token@v3.1.1
        id: app-token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Configure git auth for private repos
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout service
        uses: actions/checkout@v5
        with:
          repository: ${{ matrix.repo }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libmariadb-dev build-essential

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python and sync dependencies
        env:
          UV_GIT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv python install 3.12
          uv sync --group dev

      - name: Force-install library under test
        env:
          UV_GIT_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          uv pip install \
            "${{ inputs.library_name }} @ git+https://github.com/${{ inputs.library_repo }}.git@${{ inputs.library_tag }}" \
            --force-reinstall --no-deps

      # Populate .shared/ from github-action-templates so make check can resolve
      # `extend = ".shared/ruff.toml"` etc. Pre-commit hooks don't run in CI, so
      # without this the checked-out service fails ruff/mypy with ENOENT.
      # No language arg — sync.sh auto-detects from the checked-out service's
      # pyproject.toml / go.mod / package.json, so this keeps working if the
      # discover filter widens beyond Python later.
      - name: Sync shared configs
        run: |
          mkdir -p .shared
          curl -sfL --max-time 10 \
            "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/sync.sh" \
            -o .shared/sync.sh
          chmod +x .shared/sync.sh
          .shared/sync.sh

      - name: Run checks
        run: make check

      - name: Run tests
        run: make test

  report-result:
    needs: [discover-services, test-service]
    if: always()
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Determine result
        id: result
        run: |
          TEST_RESULT="${{ needs.test-service.result }}"
          COUNT="${{ needs.discover-services.outputs.count }}"

          if [ "$TEST_RESULT" = "success" ]; then
            echo "outcome=pass" >> $GITHUB_OUTPUT
            echo "Integration tests PASSED ($COUNT services tested)"
          elif [ "$TEST_RESULT" = "skipped" ] && [ "$COUNT" = "0" ]; then
            echo "outcome=pass" >> $GITHUB_OUTPUT
            echo "Integration tests PASSED (no dependent services found)"
          else
            echo "outcome=fail" >> $GITHUB_OUTPUT
            echo "Integration tests FAILED (test result: $TEST_RESULT)"
          fi

      - name: Generate callback token
        uses: actions/create-github-app-token@v3.1.1
        id: callback-token
        with:
          client-id: ${{ secrets.client_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch result callback
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ steps.callback-token.outputs.token }}
          repository: ${{ inputs.callback_repo }}
          event-type: ${{ inputs.callback_event_type }}
          client-payload: |-
            {
              "result": "${{ steps.result.outputs.outcome }}",
              "library_name": "${{ inputs.library_name }}",
              "library_tag": "${{ inputs.library_tag }}",
              "details_url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "services_tested": ${{ needs.discover-services.outputs.matrix }}
            }
