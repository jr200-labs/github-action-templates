name: template-ci-uv-python

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      uv-sync-args:
        description: "Additional args for uv sync (e.g. '--extra nats --extra s3' or '--all-extras')"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest"
        required: false
        type: boolean
        default: true
      apt-packages:
        description: "Space-separated list of apt packages to install before uv sync (e.g. 'libmariadb-dev')"
        required: false
        type: string
        default: ""
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      app_id:
        required: false
        description: "GitHub App ID for generating a token to clone private git deps"
      app_private_key:
        required: false
        description: "GitHub App private key for generating a token to clone private git deps"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-test:
    runs-on: ${{ inputs.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Check if private git deps auth is configured
        id: check-git-auth
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_KEY" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi
        env:
          APP_ID: ${{ secrets.app_id }}
          APP_KEY: ${{ secrets.app_private_key }}

      - name: Generate token for private git deps
        if: steps.check-git-auth.outputs.available == 'true'
        id: git-auth
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.app_id }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Write netrc for private git deps
        if: steps.git-auth.outputs.token != ''
        run: printf 'machine github.com\nlogin x-access-token\npassword %s\n' "${{ steps.git-auth.outputs.token }}" > ~/.netrc

      - name: Install system dependencies
        if: inputs.apt-packages != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ inputs.apt-packages }}

      - name: Install Python and dependencies
        run: |
          uv python install
          uv sync --group dev ${{ inputs.uv-sync-args }}

      - name: Lint
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check .

      - name: Type-check
        run: uv run mypy .

      - name: Test
        if: inputs.run-tests
        run: uv run pytest
