name: template-ci-uv-python

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      uv-sync-args:
        description: "Additional args for uv sync (e.g. '--extra nats --extra s3' or '--all-extras')"
        required: false
        type: string
        default: ""
      run-tests:
        description: "Whether to run pytest"
        required: false
        type: boolean
        default: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install Python and dependencies
        run: |
          uv python install
          uv sync --group dev ${{ inputs.uv-sync-args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Lint
        run: |
          uv run ruff check --output-format=github .
          uv run ruff format --check .

      - name: Type-check
        run: uv run mypy .

      - name: Test
        if: inputs.run-tests
        run: uv run pytest
