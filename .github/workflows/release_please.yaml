name: template-release-please

# Reusable workflow that runs googleapis/release-please-action with a
# GitHub App installation token, so tags and GitHub Releases it creates
# trigger downstream workflows (which GITHUB_TOKEN-created tags would not).
#
# Caller repos supply the release-please config + manifest files, and
# plug in whatever downstream action they want (e.g. dispatch a docker
# build) using the outputs exposed here.
#
# IMPORTANT: caller MUST declare these top-level permissions — otherwise
# the run may fail with `startup_failure` and no logs on some repos
# (see GOTCHAS.md #12):
#
#   permissions:
#     contents: write
#     pull-requests: write

on:
  workflow_call:
    inputs:
      release-type:
        description: 'release-please release-type: node | python | go | simple | ... (overrides per-package setting in config-file)'
        required: false
        type: string
        default: ''
      target-branch:
        description: 'Branch release-please tracks'
        required: false
        type: string
        default: 'master'
      config-file:
        description: 'Path to release-please config JSON'
        required: false
        type: string
        default: 'release-please-config.json'
      manifest-file:
        description: 'Path to release-please manifest JSON'
        required: false
        type: string
        default: '.release-please-manifest.json'
      client-id:
        description: 'GitHub App client ID (defaults to vars.INTEGRATION_CLIENT_ID)'
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''
    secrets:
      app_private_key:
        description: 'GitHub App private key (defaults to secrets.INTEGRATION_APP_PRIVATE_KEY via caller)'
        required: true
    outputs:
      release_created:
        description: 'true if release-please created a release on this run'
        value: ${{ jobs.release-please.outputs.release_created }}
      tag_name:
        description: 'tag name created (e.g. v1.2.3)'
        value: ${{ jobs.release-please.outputs.tag_name }}
      sha:
        description: 'sha of the release commit'
        value: ${{ jobs.release-please.outputs.sha }}
      version:
        description: 'full version (e.g. 1.2.3)'
        value: ${{ jobs.release-please.outputs.version }}
      major:
        value: ${{ jobs.release-please.outputs.major }}
      minor:
        value: ${{ jobs.release-please.outputs.minor }}
      patch:
        value: ${{ jobs.release-please.outputs.patch }}

jobs:
  release-please:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      sha: ${{ steps.release.outputs.sha }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ inputs.client-id || vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.app_private_key }}
          owner: ${{ github.repository_owner }}

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}
          target-branch: ${{ inputs.target-branch }}
          release-type: ${{ inputs.release-type }}
