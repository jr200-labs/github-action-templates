name: template-build-uv-sphinx-docs

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      unused-variable:
        description: unused-variable
        required: false
        type: string
        default: dummy

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: ''
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python and dependencies
        run: |
          uv python install
          uv sync --group dev

      - name: Build HTML
        uses: ammaraskar/sphinx-action@8.2.3
        with:
          pre-build-command: >-
            apt-get update && apt-get install -y pandoc
          docs-folder: "docs/"

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: html-docs
          path: docs/build/html/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/build/html
          publish_branch: gh-pages
          enable_jekyll: false
          force_orphan: true
