name: template-drift-check-merge-settings

# Reusable workflow: scans one or more GitHub orgs for repos violating
# the squash/rebase-only merge policy. On drift, opens or updates a
# single tracking issue in the CALLER repo listing the offenders.
# Report-only — never auto-patches. A human flips each setting via the
# repo UI (or a one-off `gh api PATCH`).
#
# Consumer usage — public-org caller (.github/workflows/drift-check.yaml):
#
#     name: drift-check
#     on:
#       schedule:
#         - cron: '13 2 * * 1'
#       workflow_dispatch:
#     jobs:
#       drift-check:
#         uses: jr200-labs/github-action-templates/.github/workflows/drift_check_merge_settings.yaml@master
#         permissions:
#           issues: write
#           contents: read
#         with:
#           orgs: ${{ github.repository_owner }}
#
# Consumer usage — private-org caller (needs App token for repo reads):
#
#     jobs:
#       drift-check:
#         uses: jr200-labs/github-action-templates/.github/workflows/drift_check_merge_settings.yaml@master
#         permissions:
#           issues: write
#           contents: read
#         with:
#           orgs: ${{ github.repository_owner }}
#           client-id: ${{ vars.INTEGRATION_CLIENT_ID }}
#         secrets:
#           INTEGRATION_APP_PRIVATE_KEY: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
#
# Auth: GITHUB_TOKEN (installation-scoped to the caller) is enough for
# public orgs, because GraphQL anonymous-ish reads work for public repos.
# Private orgs need an App-minted installation token scoped to that org;
# pass `client-id` + `INTEGRATION_APP_PRIVATE_KEY` and the workflow
# mints one transparently. Each org still scans itself — one consumer
# per org.

on:
  workflow_call:
    inputs:
      orgs:
        description: Space-separated list of orgs to scan
        required: true
        type: string
      client-id:
        description: >
          GitHub App Client ID for minting an installation token. Pass
          `vars.INTEGRATION_CLIENT_ID` from the caller so the expression
          is evaluated in the caller's context (org-level vars don't
          resolve inside cross-org reusable workflows). Optional — if
          omitted, the workflow uses GITHUB_TOKEN, which only sees the
          caller repo plus public repos in the target orgs.
        required: false
        type: string
        default: ''
    secrets:
      # Named explicitly (not `secrets: inherit`) because GitHub Actions
      # doesn't propagate org-level SECRETS across orgs via inherit, only
      # VARS. The caller must name-pass this secret.
      INTEGRATION_APP_PRIVATE_KEY:
        description: Org-level GitHub App private key for cross-repo read
        required: false

jobs:
  drift-check:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Checkout reusable-workflow repo (for scripts/)
        uses: actions/checkout@v5
        with:
          repository: jr200-labs/github-action-templates
          ref: master
          path: github-action-templates

      - name: Mint App installation token
        id: app-token
        # Only mint if both halves of the App credentials are present.
        # Falls through to GITHUB_TOKEN otherwise — fine for public orgs.
        if: inputs.client-id != '' && env.APP_KEY_SET == 'true'
        env:
          APP_KEY_SET: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY != '' }}
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ inputs.client-id }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Scan orgs
        id: scan
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
          ORGS: ${{ inputs.orgs }}
        run: |
          set +e
          combined=""
          worst_exit=0
          for org in ${ORGS}; do
            out=$(./github-action-templates/scripts/check-merge-settings.sh "${org}")
            ec=$?
            case "${ec}" in
              0) ;;  # clean
              1) combined="${combined}${out}"$'\n' ;;
              *) ;;  # API error — captured via worst_exit
            esac
            if (( ec > worst_exit )); then
              worst_exit=${ec}
            fi
          done
          set -e

          {
            echo "exit=${worst_exit}"
            echo "drift<<EOF"
            echo "${combined}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: steps.scan.outputs.exit == '1'
        env:
          # Issue creation lives on the CALLER repo, which GITHUB_TOKEN
          # can always write to. The app token isn't needed here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIFT: ${{ steps.scan.outputs.drift }}
          ORGS: ${{ inputs.orgs }}
        run: |
          title="Merge-settings drift detected"

          body=$(cat <<EOF
          Automated scan found repos violating the squash/rebase-only merge policy.
          Fix each repo via its Settings → General → Pull Requests section, or run:

          \`\`\`
          gh api -X PATCH repos/<owner>/<repo> \\
            -F allow_merge_commit=false \\
            -F allow_squash_merge=true \\
            -F allow_rebase_merge=false
          \`\`\`

          Scanned orgs: \`${ORGS}\`

          ## Drift

          \`\`\`
          ${DRIFT:-(no drift)}
          \`\`\`

          _Generated by \`drift-check-merge-settings\` on $(date -u '+%Y-%m-%d %H:%M UTC')._
          EOF
          )

          existing=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "in:title \"${title}\"" \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "${existing}" ]]; then
            gh issue edit "${existing}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "${body}"
            echo "updated issue #${existing}"
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
          fi

      - name: Fail job if drift found
        if: steps.scan.outputs.exit != '0'
        run: |
          echo "scan result: ${{ steps.scan.outputs.exit }} (1=drift, 2=api error)"
          exit 1
