name: drift-check-merge-settings

# Weekly drift check that scans one or more GitHub orgs for repos
# violating the squash/rebase-only merge policy. On drift, opens or
# updates a single tracking issue in this repo listing the offenders.
# Does NOT auto-patch; a human flips each setting via the repo UI (or
# runs a one-off `gh api PATCH`). Report-only by design — the bot
# never needs administration:write on any target repo.
#
# Configuration:
#   The list of orgs to scan is taken from `vars.DRIFT_CHECK_ORGS`
#   (space-separated). Defaults to this repo's own owner if the var
#   is unset — safe for a fresh install before anyone configures it.
#   Override per-run via workflow_dispatch input.

on:
  schedule:
    # Weekly on Mondays at 02:13 UTC (offset to dodge the cron rush).
    - cron: '13 2 * * 1'
  workflow_dispatch:
    inputs:
      orgs:
        description: Space-separated list of orgs to scan
        required: false
        type: string
        default: ''

permissions:
  # issues:write on THIS repo to post/update the drift report.
  # Target-repo reads go through GITHUB_TOKEN (public repos).
  issues: write
  contents: read

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve org list
        id: orgs
        env:
          INPUT_ORGS: ${{ inputs.orgs }}
          VAR_ORGS: ${{ vars.DRIFT_CHECK_ORGS }}
          OWNER: ${{ github.repository_owner }}
        run: |
          # Priority: workflow_dispatch input > org-level var > own owner.
          if [[ -n "${INPUT_ORGS}" ]]; then
            orgs="${INPUT_ORGS}"
          elif [[ -n "${VAR_ORGS}" ]]; then
            orgs="${VAR_ORGS}"
          else
            orgs="${OWNER}"
          fi
          echo "orgs=${orgs}" >> "$GITHUB_OUTPUT"
          echo "resolved orgs: ${orgs}"

      - name: Scan orgs
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORGS: ${{ steps.orgs.outputs.orgs }}
        run: |
          set +e
          combined=""
          worst_exit=0
          for org in ${ORGS}; do
            out=$(./scripts/check-merge-settings.sh "${org}")
            ec=$?
            case "${ec}" in
              0) ;;  # clean
              1) combined="${combined}${out}"$'\n' ;;
              *) worst_exit=2 ;;
            esac
            # Track worst severity (2 > 1 > 0) for the final gate.
            if (( ec > worst_exit )); then
              worst_exit=${ec}
            fi
          done
          set -e

          {
            echo "exit=${worst_exit}"
            echo "drift<<EOF"
            echo "${combined}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Open or update drift issue
        if: steps.scan.outputs.exit == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRIFT: ${{ steps.scan.outputs.drift }}
          ORGS: ${{ steps.orgs.outputs.orgs }}
        run: |
          title="Merge-settings drift detected"

          body=$(cat <<EOF
          Automated scan found repos violating the squash/rebase-only merge policy.
          Fix each repo via its Settings → General → Pull Requests section, or run:

          \`\`\`
          gh api -X PATCH repos/<owner>/<repo> \\
            -F allow_merge_commit=false \\
            -F allow_squash_merge=true \\
            -F allow_rebase_merge=true
          \`\`\`

          Scanned orgs: \`${ORGS}\`

          ## Drift

          \`\`\`
          ${DRIFT:-(no drift)}
          \`\`\`

          _Generated by \`drift-check-merge-settings\` on $(date -u '+%Y-%m-%d %H:%M UTC')._
          EOF
          )

          existing=$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "in:title \"${title}\"" \
            --json number \
            --jq '.[0].number // empty')

          if [[ -n "${existing}" ]]; then
            gh issue edit "${existing}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "${body}"
            echo "updated issue #${existing}"
          else
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${title}" \
              --body "${body}"
          fi

      - name: Fail job if drift found
        if: steps.scan.outputs.exit != '0'
        run: |
          echo "scan result: ${{ steps.scan.outputs.exit }} (1=drift, 2=api error)"
          exit 1
