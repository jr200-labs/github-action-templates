name: template-publish-pypi

on:
  workflow_call:
    inputs:
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"
      build-args:
        description: "build-args"
        required: false
        type: string
        default: -v
      publish-args:
        description: "publish-args"
        required: false
        type: string
        default: -vvv
      runner:
        description: 'Runner label (e.g. ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      pypi_api_token:
        required: true

jobs:
  main:
    runs-on: ${{ inputs.runner || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.checkout-ref }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.2
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Build wheel
        run: poetry build ${{ inputs.build-args }}

      - name: Publish to PyPI
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.pypi_api_token }}
        run: POETRY_REQUESTS_TIMEOUT=120 && poetry publish ${{ inputs.publish-args }}
