name: template-renovate

# Self-hosted Renovate via GitHub Actions, scoped to the calling repo only.
#
# This bypasses Mend Cloud entirely. Each consuming repo runs Renovate
# against itself on its own schedule. The per-repo `renovate.json`
# (which extends `github>jr200-labs/github-action-templates`) is
# auto-discovered.
#
# Authentication. Renovate runs against three datasources that need real
# auth: cross-repo private git tags (e.g. pyapi-service-kit @ git+https...),
# the ghcr.io container registry, and the calling repo itself for
# branch/PR/issue creation. The org-level GitHub App secrets cover all of
# this when present:
#
#   * vars.INTEGRATION_APP_ID (= the App's numeric ID)
#   * secrets.INTEGRATION_APP_PRIVATE_KEY (= the App's .pem contents)
#
# Both whengas and jr200-labs orgs publish these as org-level
# secrets/variables with visibility ALL, populated by the
# whengas-ci-integration and jr200-labs-cicd-bot Apps respectively
# (see jr200-labs JR2-18 for the architecture).
#
# When the App secrets are present (the normal case for repos under
# whengas / jr200-labs), this workflow mints a short-lived installation
# token via actions/create-github-app-token and feeds it to Renovate as
# RENOVATE_TOKEN. When they are not present (e.g. a personal-account repo
# like jr200/* before the github-action-templates transfer), it falls back
# to the runner's GITHUB_TOKEN — Renovate still works for public
# datasources (PyPI, npm, github-actions on public repos) but cross-repo
# private lookups will fail with "no-result" and the resulting PRs will
# not trigger downstream CI workflows on the same repo. The PR creation
# itself still works.
#
# Consumer usage (per-repo `.github/workflows/renovate.yml`):
#
#     name: renovate
#     on:
#       schedule:
#         - cron: '17 */4 * * *'
#       workflow_dispatch:
#     jobs:
#       renovate:
#         uses: jr200-labs/github-action-templates/.github/workflows/renovate.yml@main
#         secrets: inherit
#
# `secrets: inherit` is what wires the org-level INTEGRATION_APP_*
# secrets through to the reusable workflow. Without it the App token
# step silently falls back to GITHUB_TOKEN.

on:
  workflow_call:
    inputs:
      log-level:
        description: Renovate LOG_LEVEL — info | debug | trace
        required: false
        type: string
        default: info
      dry-run:
        description: Renovate dry-run mode (full | extract | lookup | empty for normal)
        required: false
        type: string
        default: ''
    secrets:
      # The App private key is declared as an explicit named secret input
      # because GitHub Actions has a quirk: variables inherited via
      # `secrets: inherit` work across orgs, but SECRETS inherited the same
      # way only work within the same org. Since github-action-templates
      # lives in jr200-labs and most callers live in whengas, we have to
      # name the secret explicitly so the caller can pass it through.
      INTEGRATION_APP_PRIVATE_KEY:
        description: Org-level GitHub App private key (whengas-ci-integration / jr200-labs-cicd-bot)
        required: false

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Mint App installation token
        id: app-token
        # Gate only on the (non-sensitive) INTEGRATION_APP_ID variable.
        # `secrets.*` is not allowed in `if:` expressions in GitHub Actions.
        # The matching INTEGRATION_APP_PRIVATE_KEY secret is managed
        # alongside the variable as a pair (see jr200-labs JR2-18).
        if: ${{ vars.INTEGRATION_APP_ID != '' }}
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.INTEGRATION_APP_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Self-hosted Renovate
        # renovatebot/github-action only publishes specific patch tags, no
        # floating majors. Pin to a known-good release; Renovate itself can
        # be updated independently of this action via the `renovate-version`
        # input below if needed.
        uses: renovatebot/github-action@v46.1.8
        with:
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: ${{ inputs.log-level }}
          # Restrict Renovate to the current repo only.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          # The per-repo renovate.json already exists (it extends the shared
          # jr200-labs/github-action-templates preset). Skip the onboarding
          # PR flow so Renovate doesn't open a "Configure Renovate" PR.
          RENOVATE_ONBOARDING: 'false'
          RENOVATE_REQUIRE_CONFIG: 'required'
          # Optional dry-run for debugging without creating branches/PRs.
          RENOVATE_DRY_RUN: ${{ inputs.dry-run }}
